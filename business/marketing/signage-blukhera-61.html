<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вывеска Бархат - Блюхера 61</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .signage {
            /* Пропорция 3.5:1 (2.1m × 0.6m) */
            width: 2100px;
            height: 600px;
            background: linear-gradient(135deg, #8B1E3F 0%, #6B152F 100%);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* Текстура */
        .signage::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
            pointer-events: none;
        }

        .logo {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            z-index: 2;
        }

        .logo-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo-title {
            font-size: 100px;
            font-weight: 900;
            color: #FFFFFF;
            letter-spacing: 8px;
            line-height: 1;
            text-transform: uppercase;
        }

        .logo-subtitle {
            font-size: 24px;
            font-weight: 500;
            color: #FFFFFF;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex: 1;
            height: 100%;
            padding: 0 60px 0 550px;
            z-index: 1;
        }

        .main-text {
            font-size: 72px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            margin-bottom: 60px;
        }

        .requisites {
            font-size: 32px;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* Декоративные элементы */
        .decoration {
            position: absolute;
            opacity: 0.1;
            pointer-events: none;
        }

        .decoration-1 {
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ffffff 0%, transparent 70%);
            border-radius: 50%;
        }

        .decoration-2 {
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #ffffff 0%, transparent 70%);
            border-radius: 50%;
        }

        /* Scale for preview */
        .preview {
            transform: scale(0.5);
            transform-origin: center center;
            width: 4200px;
            height: 1200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="preview">
        <div class="signage">
            <div class="decoration decoration-1"></div>
            <div class="decoration decoration-2"></div>

            <div class="logo">
                <div class="logo-main">
                    <img src="identity/icon-strawberry.png" alt="" class="logo-icon" onerror="this.style.display='none'">
                    <div class="logo-text">
                        <div class="logo-title">бархат</div>
                        <div class="logo-subtitle">свежая флуористика</div>
                    </div>
                </div>
            </div>

            <div class="content">
                <div class="main-text">клубничные и цветочные букеты</div>
                <div class="requisites">ИП Насуленко А.В. Режим работы: 09:00 - 21:00. Адрес: Блюхера, 61.</div>
            </div>
        </div>
    </div>
</body>
</html>
