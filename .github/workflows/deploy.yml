name: Deploy to Amvera

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Amvera
        uses: amvera/git-deploy-action@v1
        with:
          project: ${{ secrets.AMVERA_PROJECT }}
          username: ${{ secrets.AMVERA_USERNAME }}
          token: ${{ secrets.AMVERA_TOKEN }}
