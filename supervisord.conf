[supervisord]
nodaemon=true
user=root

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0
autorestart=true

[program:flask]
command=gunicorn -w 2 -b 127.0.0.1:5000 app:app
directory=/app
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stdout
stderr_logfile_maxbytes=0
autorestart=true
environment=
    PYTHONUNBUFFERED="1",
    PYRUS_ACCESS_TOKEN="%(env_PYRUS_ACCESS_TOKEN)s",
    PYRUS_LOGIN="%(env_PYRUS_LOGIN)s",
    BARKHAT_SSO_SECRET="%(env_BARKHAT_SSO_SECRET)s",
    SESSION_SECRET="%(env_SESSION_SECRET)s",
    RETAILCRM_API_KEY="%(env_RETAILCRM_API_KEY)s",
    MOYSKLAD_LOGIN="%(env_MOYSKLAD_LOGIN)s",
    MOYSKLAD_TOKEN="%(env_MOYSKLAD_TOKEN)s"
