# Основной конфиг nginx для Amvera

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Логи
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Оптимизация
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Upstream для Flask (gunicorn)
    upstream flask_app {
        server 127.0.0.1:5000;
        keepalive 32;
    }

    # Разрешаем встраивание в Пульс и в iframe на том же домене (CSP)
    add_header Content-Security-Policy "frame-ancestors 'self' https://proekt-barhat-doorhandle2.amvera.io" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Важно: НЕ добавляем X-Frame-Options, он конфликтует с frame-ancestors

    server {
        listen 80;
        server_name _;

        # SSO endpoint — открыт, проксируем на Flask
        location /sso {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Важно для redirect и Set-Cookie
            proxy_redirect off;
        }

        # Verify endpoint для auth_request — проксируем на Flask
        location /verify {
            internal;
            proxy_pass http://flask_app/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API endpoints — проксируем на Flask
        location /api/ {
            auth_request /verify;
            error_page 401 = @denied;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        # Health check — открыт
        location /api/health {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
        }

        # Статика и главная страница — проверка сессии через auth_request
        location / {
            auth_request /verify;
            error_page 401 = @denied;
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html =404;

            gzip on;
            gzip_types text/css text/javascript application/javascript application/json;
        }

        # Отказ в доступе
        location @denied {
            return 403 "Access denied. Please login via БАРХАТ Пульс.";
        }
    }
}
