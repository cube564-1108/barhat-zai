server {
    listen 80;
    server_name localhost;

    # Upstream для Flask (gunicorn)
    upstream flask_app {
        server 127.0.0.1:5000;
        keepalive 32;
    }

    # Разрешаем встраивание в Пульс (CSP)
    add_header Content-Security-Policy "frame-ancestors https://proekt-barhat-doorhandle2.amvera.io" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Важно: НЕ добавляем X-Frame-Options, он конфликтует с frame-ancestors

    # SSO endpoint — открыт, проксируем на Flask
    location /sso {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Важно для redirect и Set-Cookie
        proxy_redirect off;
    }

    # Verify endpoint для auth_request — проксируем на Flask
    location /verify {
        internal;
        proxy_pass http://flask_app/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API endpoints — проксируем на Flask
    location /api/ {
        auth_request /verify;
        error_page 401 = @denied;
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Health check — открыт
    location /api/health {
        proxy_pass http://flask_app;
        proxy_set_header Host $host;
    }

    # Статика и главная страница — проверка сессии через auth_request
    location / {
        auth_request /verify;
        error_page 401 = @denied;
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html =404;

        gzip on;
        gzip_types text/css text/javascript application/javascript application/json;
    }

    # Отказ в доступе
    location @denied {
        return 403 "Access denied. Please login via БАРХАТ Пульс.";
    }
}
