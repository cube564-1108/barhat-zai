<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бархат — Дашборд</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vollkorn:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Фирменные токены Бархат */
        :root {
            --barkhat-wine: #411330;
            --barkhat-pink: #D19CC2;
            --barkhat-pink-bright: #E1A4C9;
            --barkhat-pink-light: #E4C2DD;
            --barkhat-pink-deep: #B26FA1;
            --barkhat-gray-dark: #3C3C3C;
            --barkhat-gray: #6F6F6F;
            --barkhat-white: #FFFFFF;
            --barkhat-gradient: linear-gradient(135deg, #E1A4C9 0%, #B26FA1 100%);
            --font-heading: 'Vollkorn', Georgia, serif;
            --font-body: 'Inter', 'PT Sans', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--barkhat-wine);
            color: var(--barkhat-gray-dark);
            height: 100vh;
            display: flex;
            overflow: hidden;
            font-weight: 300;
            line-height: 1.5;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: var(--barkhat-wine);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            border-right: 1px solid rgba(209, 156, 194, 0.2);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(209, 156, 194, 0.15);
        }

        .sidebar-header h1 {
            font-family: var(--font-heading);
            color: var(--barkhat-white);
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }

        .sidebar-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            font-weight: 300;
            font-family: var(--font-body);
        }

        .nav {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
        }

        .category {
            margin-bottom: 20px;
        }

        .category-title {
            padding: 8px 12px;
            color: var(--barkhat-pink);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 500;
            opacity: 0.8;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            color: var(--barkhat-white);
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 4px;
            opacity: 0.8;
            font-family: var(--font-body);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            opacity: 1;
        }

        .nav-item.active {
            background: var(--barkhat-gradient);
            opacity: 1;
        }

        .nav-item .icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .nav-item .title {
            font-size: 14px;
            font-weight: 400;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(209, 156, 194, 0.15);
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-weight: 300;
        }

        /* Main content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f5f5f5;
        }

        .main-header {
            padding: 16px 24px;
            background: var(--barkhat-white);
            border-bottom: 1px solid var(--barkhat-pink-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .main-header h2 {
            font-family: var(--font-heading);
            color: var(--barkhat-wine);
            font-size: 18px;
            font-weight: 600;
            line-height: 1.2;
        }

        .main-header .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 9px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-body);
            border: 1px solid var(--barkhat-pink);
            background: var(--barkhat-white);
            color: var(--barkhat-pink-deep);
        }

        .btn:hover {
            background: var(--barkhat-gradient);
            color: var(--barkhat-white);
            border-color: transparent;
        }

        /* Content frame */
        .content-frame {
            flex: 1;
            overflow: hidden;
        }

        .content-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Scrollbar */
        .nav::-webkit-scrollbar {
            width: 4px;
        }

        .nav::-webkit-scrollbar-track {
            background: transparent;
        }

        .nav::-webkit-scrollbar-thumb {
            background: rgba(209, 156, 194, 0.3);
            border-radius: 2px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 100;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .mobile-toggle {
                display: flex !important;
                margin-right: 12px;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>Бархат</h1>
            <p>Панель управления</p>
        </div>
        <nav class="nav" id="nav">
            <!-- Навигация генерируется из JS -->
        </nav>
        <div class="sidebar-footer">
            © Бархат — сеть цветочных салонов
        </div>
    </aside>

    <main class="main">
        <header class="main-header">
            <div style="display: flex; align-items: center;">
                <button class="btn mobile-toggle" style="display: none;" onclick="toggleSidebar()">☰</button>
                <h2 id="pageTitle">Загрузка...</h2>
            </div>
            <div class="actions">
                <a class="btn" onclick="reloadFrame()">↻ Обновить</a>
            </div>
        </header>
        <div class="content-frame">
            <iframe id="contentFrame" src="about:blank"></iframe>
        </div>
    </main>

    <script>
        // Конфиг встроен напрямую для работы без сервера
        const config = {
            "title": "Бархат — Дашборд",
            "categories": [
                {
                    "id": "reports",
                    "title": "Отчеты",
                    "items": [
                        {
                            "id": "quality",
                            "title": "Качество сборки букетов",
                            "url": "./quality-report-14-18.html",
                            "icon": "📊"
                        },
                        {
                            "id": "night-shifts",
                            "title": "Ночные смены",
                            "url": "./night-shifts-monthly-analysis.html",
                            "icon": "🌙"
                        }
                    ]
                }
            ],
            "default": "quality"
        };

        let currentItem = null;

        // Рендер навигации
        function renderNav() {
            const nav = document.getElementById('nav');
            nav.innerHTML = '';

            config.categories.forEach(category => {
                const categoryEl = document.createElement('div');
                categoryEl.className = 'category';

                const titleEl = document.createElement('div');
                titleEl.className = 'category-title';
                titleEl.textContent = category.title;
                categoryEl.appendChild(titleEl);

                category.items.forEach(item => {
                    const itemEl = document.createElement('a');
                    itemEl.className = 'nav-item';
                    itemEl.dataset.itemId = item.id;
                    itemEl.innerHTML = `
                        <span class="icon">${item.icon || '📄'}</span>
                        <span class="title">${item.title}</span>
                    `;
                    itemEl.addEventListener('click', (e) => {
                        e.preventDefault();
                        loadItem(item);
                    });
                    categoryEl.appendChild(itemEl);
                });

                nav.appendChild(categoryEl);
            });
        }

        // Загрузка элемента
        function loadItem(item) {
            currentItem = item;

            // Обновляем активный класс
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
                if (el.dataset.itemId === item.id) {
                    el.classList.add('active');
                }
            });

            // Обновляем заголовок
            document.getElementById('pageTitle').textContent = item.title;

            // Загружаем контент в iframe
            const frame = document.getElementById('contentFrame');
            frame.src = item.url;

            // Закрываем sidebar на мобильных
            document.getElementById('sidebar').classList.remove('open');
        }

        // Загрузка элемента по умолчанию
        function loadDefaultItem() {
            if (!config.default) return;

            for (const category of config.categories) {
                const item = category.items.find(i => i.id === config.default);
                if (item) {
                    loadItem(item);
                    return;
                }
            }
        }

        // Перезагрузка iframe
        function reloadFrame() {
            const frame = document.getElementById('contentFrame');
            frame.src = frame.src;
        }

        // Toggle sidebar на мобильных
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Инициализация
        renderNav();
        loadDefaultItem();
    </script>
</body>
</html>
